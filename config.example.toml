[google]
calendar_ids = ["primary"]
credentials_file = "credentials.json"
token_file = "token.json"

[pushbullet]
api_key = "o.your_api_key_here"
device_iden = "your_device_iden_here"

[schedule]
lookahead_days = 7
poll_interval_minutes = 5

[database]
path = "sent_messages.db"

# Email watch — monitor an inbox and text you when matching emails arrive.
# Supports Gmail (imap.gmail.com) and Hotmail/Outlook (outlook.office365.com).
# For Gmail: enable 2FA, then create an App Password at https://myaccount.google.com/apppasswords
# For Hotmail/Outlook: use your regular password, or an app password if 2FA is enabled.
[email_watch]
enabled = false
imap_server = "imap.gmail.com"            # or "outlook.office365.com" for Hotmail/Outlook
email_address = "you@gmail.com"
app_password = "your_app_password_here"

[[email_watch.rules]]
subject = "It's here… free product time!"
phone_number = "817-555-1234"
message = "Free product email just arrived! Go go go!"
